<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultSync — Sign In</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="page-center">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">⬡</div>
        <h1 class="brand-name">VaultSync</h1>
        <p class="brand-tagline">Zero-knowledge encrypted storage</p>
      </div>

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab active" data-tab="login">Sign In</button>
        <button class="tab"        data-tab="register">Register</button>
      </div>

      <!-- Sign In -->
      <div id="tab-login" class="tab-content active">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="login-pass">Password</label>
          <div class="password-wrap">
            <input type="password" id="login-pass" placeholder="••••••••••••" autocomplete="current-password" />
            <button class="toggle-pass" id="toggle-login-pass" aria-label="Show password">👁</button>
          </div>
        </div>
        <button id="btn-login" class="btn btn-primary full-width">
          <span class="btn-label">Sign In</span>
          <span class="btn-spinner" hidden>⟳</span>
        </button>
      </div>

      <!-- Register -->
      <div id="tab-register" class="tab-content">
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="reg-pass">Password</label>
          <div class="password-wrap">
            <input type="password" id="reg-pass" placeholder="••••••••••••" autocomplete="new-password" />
            <button class="toggle-pass" id="toggle-reg-pass" aria-label="Show password">👁</button>
          </div>
        </div>
        <button id="btn-register" class="btn btn-primary full-width">
          <span class="btn-label">Create Account</span>
          <span class="btn-spinner" hidden>⟳</span>
        </button>
      </div>

      <p id="auth-error" class="error-msg" hidden></p>

    </div>
  </div>

  <script type="module">
    import { redirectIfAuthed, navigateTo }    from "../assets/js/router.js";
    import { loginUser, registerUser } from "../assets/js/auth.js";

    // Redirect already-authed users straight to dashboard
    await redirectIfAuthed("dashboard.html");

    // ── Tab switching ──────────────────────────────────────────────────
    const tabs = document.querySelectorAll(".tab");
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;
        tabs.forEach((t) => t.classList.toggle("active", t.dataset.tab === target));
        document.getElementById("tab-login").classList.toggle("active",    target === "login");
        document.getElementById("tab-register").classList.toggle("active", target === "register");
        document.getElementById("auth-error").hidden = true;
      });
    });

    // ── Password toggles ───────────────────────────────────────────────
    document.querySelectorAll(".toggle-pass").forEach((btn) => {
      btn.addEventListener("click", () => {
        const wrap  = btn.closest(".password-wrap");
        const input = wrap.querySelector("input");
        input.type  = input.type === "password" ? "text" : "password";
      });
    });

    // ── Helpers ────────────────────────────────────────────────────────
    const authError = document.getElementById("auth-error");

    function setLoading(btn, loading) {
      btn.querySelector(".btn-label").hidden   = loading;
      btn.querySelector(".btn-spinner").hidden = !loading;
      btn.disabled = loading;
    }

    function showError(msg) {
      authError.textContent = msg;
      authError.hidden      = !msg;
    }

    function friendlyError(code) {
      const map = {
        "auth/invalid-email":          "Invalid email address.",
        "auth/user-not-found":         "No account found with that email.",
        "auth/wrong-password":         "Incorrect password.",
        "auth/email-already-in-use":   "An account with that email already exists.",
        "auth/weak-password":          "Password must be at least 6 characters.",
        "auth/network-request-failed": "Network error — check your connection.",
        "auth/too-many-requests":      "Too many attempts. Please wait and try again.",
        "auth/invalid-credential":     "Invalid credentials. Check your email and password.",
      };
      return map[code] ?? `Error: ${code}`;
    }

    // ── Sign In ────────────────────────────────────────────────────────
    const btnLogin = document.getElementById("btn-login");
    btnLogin.addEventListener("click", async () => {
      showError("");
      setLoading(btnLogin, true);
      try {
        await loginUser(
          document.getElementById("login-email").value.trim(),
          document.getElementById("login-pass").value,
        );
        navigateTo("dashboard.html");
      } catch (err) {
        showError(friendlyError(err.code));
      } finally {
        setLoading(btnLogin, false);
      }
    });

    // ── Register ───────────────────────────────────────────────────────
    const btnRegister = document.getElementById("btn-register");
    btnRegister.addEventListener("click", async () => {
      showError("");
      setLoading(btnRegister, true);
      try {
        await registerUser(
          document.getElementById("reg-email").value.trim(),
          document.getElementById("reg-pass").value,
        );
        navigateTo("dashboard.html");
      } catch (err) {
        showError(friendlyError(err.code));
      } finally {
        setLoading(btnRegister, false);
      }
    });

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      const loginActive = document.getElementById("tab-login").classList.contains("active");
      if (loginActive) btnLogin.click(); else btnRegister.click();
    });
  </script>
</body>
</html>

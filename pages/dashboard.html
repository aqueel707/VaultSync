<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VaultSync — Dashboard</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="page-dashboard">
    <div class="dashboard-wrap">

      <!-- Brand -->
      <div class="dashboard-brand">
        <div class="brand-icon">⬡</div>
        <h1 class="brand-name">VaultSync</h1>
        <p class="brand-tagline">Zero-knowledge encrypted storage</p>
      </div>

      <!-- User info row -->
      <div class="dashboard-user">
        <div class="dashboard-user-info">
          <span class="dashboard-user-label">Signed in as</span>
          <span id="user-email" class="dashboard-user-email">…</span>
        </div>
        <span id="storage-badge" class="storage-badge managed">App Storage</span>
      </div>

      <!-- Navigation cards -->
      <div class="nav-grid">
        <a href="upload.html" class="nav-card">
          <span class="nav-card-icon">↑</span>
          <span class="nav-card-title">Upload File</span>
          <span class="nav-card-desc">Encrypt &amp; upload a file to the cloud</span>
        </a>

        <a href="files.html" class="nav-card">
          <span class="nav-card-icon">▤</span>
          <span class="nav-card-title">My Files</span>
          <span class="nav-card-desc">Browse, decrypt, and download your files</span>
        </a>

        <a href="settings.html" class="nav-card">
          <span class="nav-card-icon">⚙</span>
          <span class="nav-card-title">Storage Settings</span>
          <span class="nav-card-desc">Switch between app storage and your own Firebase bucket</span>
        </a>

        <button id="btn-logout" class="nav-card">
          <span class="nav-card-icon">⏻</span>
          <span class="nav-card-title">Sign Out</span>
          <span class="nav-card-desc">End your current session</span>
        </button>
      </div>

    </div>
  </div>

  <script type="module">
    import { requireAuth, navigateTo, markLoggedOut } from "../assets/js/router.js";
    import { logoutUser }     from "../assets/js/auth.js";
    import * as storageManager from "../assets/js/storage-manager.js";

    // Guard — redirects to login if not authed
    const user = await requireAuth("login.html");

    // Restore storage mode from localStorage
    await storageManager.initFromStorage();

    // Populate UI
    document.getElementById("user-email").textContent = user.email;
    const badge = document.getElementById("storage-badge");
    const mode  = storageManager.getMode();
    badge.textContent = mode === "user" ? "Your Storage" : "App Storage";
    badge.className   = `storage-badge ${mode}`;

    // Logout
    document.getElementById("btn-logout").addEventListener("click", async () => {
      await logoutUser();
      markLoggedOut();
      navigateTo("login.html");
    });
  </script>
</body>
</html>
